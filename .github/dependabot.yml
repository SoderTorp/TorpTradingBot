version: 2

updates:
  # Python dependencies (pip)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "UTC"
    
    # Pull request settings
    pull-request-branch-name:
      separator: "/"
    
    # Commit message customization
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    
    # Version updates
    versioning-strategy: "auto"
    open-pull-requests-limit: 10
    
    # Labels for generated PRs
    labels:
      - "dependencies"
      - "security"
    
    # Allow both direct and indirect dependencies
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"

  # GitHub Actions workflow updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "UTC"
    
    pull-request-branch-name:
      separator: "/"
    
    commit-message:
      prefix: "ci:"
      include: "scope"
    
    labels:
      - "ci"
      - "github-actions"