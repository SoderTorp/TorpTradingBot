name: "Dependency Scanning"

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'poetry.lock'
      - 'setup.py'
  pull_request:
    branches:
      - main
    paths:
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'poetry.lock'
      - 'setup.py'
  schedule:
    # Run daily at 3 AM UTC to catch newly disclosed vulnerabilities
    - cron: '0 3 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-check:
    name: Check Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      # Scan for known vulnerabilities using pip-audit
      - name: Run pip-audit
        id: audit
        continue-on-error: true
        run: |
          pip-audit --desc > audit-report.txt 2>&1 || true
          cat audit-report.txt

      # Also check with safety (community vulnerability database)
      - name: Install and run Safety
        id: safety
        continue-on-error: true
        run: |
          pip install safety
          safety check --json > safety-report.json || true

      # Parse and report findings
      - name: Check for vulnerabilities
        run: |
          if grep -q "has 0 known security vulnerabilities" audit-report.txt; then
            echo "✅ No vulnerabilities found in dependencies"
            exit 0
          else
            echo "⚠️ Vulnerabilities detected"
            cat audit-report.txt
            exit 1
          fi

      # Comment on PR with findings (if this is a pull request)
      - name: Comment on PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const auditReport = fs.readFileSync('audit-report.txt', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⚠️ **Dependency Vulnerabilities Detected**\n\n\`\`\`\n${auditReport}\n\`\`\`\n\nPlease review and update vulnerable dependencies before merging.`
            });

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-reports
          path: |
            audit-report.txt
            safety-report.json

  # Dependabot alerts are automatically handled by GitHub's native Dependabot feature
  # This job serves as a reminder and verification step
  dependabot-check:
    name: Verify Dependabot Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify .github/dependabot.yml exists
        run: |
          if [ ! -f .github/dependabot.yml ]; then
            echo "⚠️ Dependabot configuration not found"
            echo "Please create .github/dependabot.yml for automated dependency updates"
            exit 1
          fi
          echo "✅ Dependabot configuration found"

  # Generate SBOM (Software Bill of Materials)
  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pip-tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools pip-audit

      - name: Generate requirements.txt with hashes
        run: |
          pip-compile requirements.txt --generate-hashes --output-file=requirements-locked.txt

      - name: Generate SBOM with pip-audit
        continue-on-error: true
        run: |
          pip-audit --desc --format json > sbom.json || true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            requirements-locked.txt
            sbom.json
